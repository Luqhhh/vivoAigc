services:
  - type: web
    name: codemotion-api
    runtime: node
    plan: free
    branch: codex/real-lanxin-apk
    buildCommand: corepack enable && pnpm install --frozen-lockfile --prod=false && pnpm --filter @codemotion/api build
    startCommand: pnpm --filter @codemotion/api start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: LLM_MODE
        value: real
      - key: LANXIN_API_URL
        value: https://api-ai.vivo.com.cn/v1/chat/completions
      - key: LANXIN_MODEL
        value: Doubao-Seed-2.0-mini
      - key: LANXIN_APP_ID
        sync: false
      - key: LANXIN_APP_KEY
        sync: false
      - key: FRONTEND_ORIGIN
        value: https://localhost
